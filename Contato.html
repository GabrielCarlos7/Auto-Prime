<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Prime | Contato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top px-3">
        <div class="container-fluid">
            <a class="navbar-brand text-primary fw-bold fs-3" href="index.html"><i class="fa-solid fa-car-side me-2"></i>AUTO PRIME</a>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-2">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="sobre.html">Sobre Nós</a></li>
                    <li class="nav-item"><a class="nav-link" href="carros.html">Carros</a></li>
                    <li class="nav-item"><a class="nav-link" href="equipe.html">Equipe</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contato.html">Contato</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <h1 class="text-center fw-bold mb-5">Fale <span class="text-primary">Conosco</span></h1>
        
        <div class="row g-5">
            <div class="col-lg-6">
                <form class="bg-light p-4 rounded shadow-sm">
                    <div class="mb-3">
                        <label for="nome" class="form-label fw-bold">Nome Completo</label>
                        <input type="text" class="form-control" id="nome" placeholder="Digite seu nome" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label fw-bold">E-mail</label>
                        <input type="email" class="form-control" id="email" placeholder="nome@exemplo.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="carro" class="form-label fw-bold">Qual modelo você busca?</label>
                        <select class="form-select" id="carro">
                            <option selected>Selecione um segmento...</option>
                            <option value="1">Esportivos</option>
                            <option value="2">SUVs de Luxo</option>
                            <option value="3">Elétricos / Híbridos</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="mensagem" class="form-label fw-bold">Mensagem</label>
                        <textarea class="form-control" id="mensagem" rows="4" placeholder="Deixe sua mensagem para nossos consultores..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Enviar Proposta</button>
                </form>
            </div>

            <div class="col-lg-6">
                <div class="w-100 h-100 min-vh-400 border rounded shadow-sm overflow-hidden">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!11m18!1m12!1m3!1d3657.1975422896593!2d-46.65886982467006!3d-23.56134967879899!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94ce59c8da0aa315%3A0xd59f94317979777!2sAv.%20Paulista%2C%20S%C3%A3o%20Paulo%20-%20SP!5e0!3m2!1spt-BR!2sbr!4v1710000000000!5m2!1spt-BR!2sbr" 
                        width="100%" 
                        height="100%" 
                        style="border:0; min-height: 350px;" 
                        allowfullscreen="" 
                        loading="lazy">
                    </iframe>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <p class="mb-0">&copy; 2026 Auto Prime.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
